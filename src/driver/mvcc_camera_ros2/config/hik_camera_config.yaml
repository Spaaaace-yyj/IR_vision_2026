# 海康威视相机参数配置文件（完整模板）
#
# 使用说明：
# 1. 当前驱动会把本文件中“未注释”的参数在启动时自动下发给相机。
# 2. 当前驱动参数文件支持的节点类型为：
#    - integer / float / bool / string / enum
#    - 不支持 command 类型节点直接在 YAML 中执行
# 3. 不同相机型号、固件版本、USB/GigE 传输层支持的节点不同。
#    如果启动时提示某个参数 not found / not applied，删除或注释该项即可。
# 4. 自动和手动参数通常互斥：
#    - 开启 ExposureAuto 时，通常不要再固定 ExposureTime
#    - 开启 GainAuto 时，通常不要再固定 Gain
# 5. 枚举值请使用海康节点的 symbolic 字符串，注意大小写，例如：
#    - Off / Once / Continuous
#    - User / sRGB
#    - Software / Line0
#    - RisingEdge / FallingEdge
#
# 建议：
# - 先只保留“当前启用参数”这一小组，确认相机稳定启动
# - 再按需逐项取消注释，观察日志确认该机型是否支持

/**:
  ros__parameters:
    # ============================================================
    # 1. 基础连接与设备标识
    # ============================================================

    # 相机序列号。
    # 类型: string
    # 作用: 指定连接哪一台相机；如果填错，会导致找不到设备。
    # 示例: "DB0060520"
    cam_sn: "DB0060520"

    # 设备自定义名称。
    # 类型: string
    # 作用: 给相机写入一个便于识别的名字。
    # 注意: 并非所有机型都支持写入。
    # DeviceUserID: "front_camera"

    # ============================================================
    # 2. 当前启用参数（你现在这套配置）
    # ============================================================

    # 图像宽度，单位像素。
    # 类型: integer
    # 注意: 通常需要满足步进要求；修改后 OffsetX 可用范围也会变化。
    Width: 1280

    # 图像高度，单位像素。
    # 类型: integer
    # 注意: 通常需要满足步进要求；修改后 OffsetY 可用范围也会变化。
    Height: 1024

    # ROI 左上角 X 偏移，单位像素。
    # 类型: integer
    OffsetX: 0

    # ROI 左上角 Y 偏移，单位像素。
    # 类型: integer
    OffsetY: 0

    # 像素格式。
    # 类型: enum(string)
    # 常见可选值:
    #   - Mono8
    #   - BayerRG8
    #   - BayerGR8
    #   - BayerGB8
    #   - BayerBG8
    #   - RGB8
    # 注意: 实际支持项以相机型号为准。
    PixelFormat: BayerRG8

    # 曝光时间，单位微秒(us)。
    # 类型: float
    # 注意: 若 ExposureAuto 打开，该值通常会被自动曝光接管。
    ExposureTime: 7000.0

    # 模拟/数字增益。
    # 类型: float
    # 单位: dB（常见）
    # 注意: 若 GainAuto 打开，该值通常会被自动增益接管。
    Gain: 20.0

    # ============================================================
    # 3. 采集与帧率
    # ============================================================

    # 采集模式。
    # 类型: enum(string)
    # 常见值:
    #   - Continuous
    #   - SingleFrame
    #   - MultiFrame
    # AcquisitionMode: Continuous

    # 是否启用帧率限制。
    # 类型: bool
    # true: 使用 AcquisitionFrameRate 限制输出帧率
    # false: 由曝光、带宽、触发等条件自然决定帧率
    AcquisitionFrameRateEnable: true

    # 目标采集帧率。
    # 类型: float
    # 单位: fps
    # 注意: 只有在 AcquisitionFrameRateEnable=true 时通常才生效。
    AcquisitionFrameRate: 24.0

    # 线阵相机行频。
    # 类型: integer
    # 单位: Hz 或 line/s（依机型而定）
    # 注意: 面阵相机通常不支持。
    # AcquisitionLineRate: 505

    # ============================================================
    # 4. 曝光与增益
    # ============================================================

    # 曝光模式。
    # 类型: enum(string)
    # 常见值:
    #   - Timed
    #   - TriggerWidth
    # 注意: 仅部分机型支持 TriggerWidth。
    # ExposureMode: Timed

    # 自动曝光模式。
    # 类型: enum(string)
    # 常见值:
    #   - Off
    #   - Once
    #   - Continuous
    # 注意: 打开后通常不要再固定 ExposureTime。
    # ExposureAuto: Off

    # 自动增益模式。
    # 类型: enum(string)
    # 常见值:
    #   - Off
    #   - Once
    #   - Continuous
    # 注意: 打开后通常不要再固定 Gain。
    GainAuto: Off

    # 自动曝光下限。
    # 类型: integer
    # 单位: 微秒(us)
    # 注意: 有些机型节点名是 AutoExposureTimeLower，
    #       有些机型是 AutoExposureTimeLowerLimit。
    # AutoExposureTimeLower: 100
    # AutoExposureTimeLowerLimit: 100

    # 自动曝光上限。
    # 类型: integer
    # 单位: 微秒(us)
    # 注意: 有些机型节点名是 AutoExposureTimeUpper，
    #       有些机型是 AutoExposureTimeUpperLimit。
    # AutoExposureTimeUpper: 20000
    # AutoExposureTimeUpperLimit: 20000

    # 自动增益下限。
    # 类型: float 或 integer（取决于机型）
    # 注意: 有些机型节点名是 AutoGainLower，
    #       有些机型是 AutoGainLowerLimit。
    # AutoGainLower: 0.0
    # AutoGainLowerLimit: 0.0

    # 自动增益上限。
    # 类型: float 或 integer（取决于机型）
    # 注意: 有些机型节点名是 AutoGainUpper，
    #       有些机型是 AutoGainUpperLimit。
    # AutoGainUpper: 24.0
    # AutoGainUpperLimit: 24.0

    # ============================================================
    # 5. 图像格式、ROI、抽样与翻转
    # ============================================================

    # 水平 binning。
    # 类型: integer
    # 常见值: 1 / 2 / 4
    # 注意: 不是所有机型都支持。
    # BinningHorizontal: 1

    # 垂直 binning。
    # 类型: integer
    # BinningVertical: 1

    # 水平抽样。
    # 类型: integer
    # 常见值: 1 / 2 / 4
    # 注意: 不是所有机型都支持。
    # DecimationHorizontal: 1

    # 垂直抽样。
    # 类型: integer
    # DecimationVertical: 1

    # 左右镜像。
    # 类型: bool
    # ReverseX: false

    # 上下翻转。
    # 类型: bool
    # ReverseY: false

    # ============================================================
    # 6. 颜色与图像增强
    # ============================================================

    # Gamma 选择器。
    # 类型: enum(string)
    # 常见值:
    #   - User
    #   - sRGB
    # 注意: 一般先设 GammaSelector，再设 Gamma。
    # GammaSelector: User

    # Gamma 值。
    # 类型: float
    # 典型范围: 0.1 ~ 4.0
    # 注意: 是否生效与像素格式、ISP/颜色转换链路有关。
    # Gamma: 0.1

    # 黑电平。
    # 类型: float 或 integer（取决于机型）
    # 作用: 调整图像暗场基线。
    # BlackLevel: 0.0

    # 是否启用饱和度调节。
    # 类型: bool
    # 一般只对彩色相机有意义。
    # SaturationEnable: true

    # 饱和度。
    # 类型: integer
    # 一般只对彩色相机有意义。
    # Saturation: 128

    # 自动白平衡。
    # 类型: enum(string)
    # 常见值:
    #   - Off
    #   - Once
    #   - Continuous
    # BalanceWhiteAuto: Once

    # 白平衡通道选择器。
    # 类型: enum(string)
    # 常见值:
    #   - Red
    #   - Green
    #   - Blue
    # 注意: YAML 中不能同时保留多组同名键，
    #       需要一次只配置一组 BalanceRatioSelector + BalanceRatio。
    # BalanceRatioSelector: Red

    # 当前选中通道的白平衡增益。
    # 类型: integer
    # 注意: 需要与 BalanceRatioSelector 配对使用。
    # BalanceRatio: 1024

    # ============================================================
    # 7. 触发相关
    # ============================================================

    # 触发模式。
    # 类型: enum(string)
    # 常见值:
    #   - Off
    #   - On
    # 注意: 自由取流通常设为 Off。
    # TriggerMode: Off

    # 触发源。
    # 类型: enum(string)
    # 常见值:
    #   - Software
    #   - Line0
    #   - Line1
    #   - Counter0
    # 注意: 只有 TriggerMode=On 时通常才有意义。
    # TriggerSource: Software

    # 触发选择器。
    # 类型: enum(string)
    # 常见值:
    #   - FrameStart
    #   - ExposureStart
    # 注意: 不同机型支持项差异很大。
    # TriggerSelector: FrameStart

    # 触发沿。
    # 类型: enum(string)
    # 常见值:
    #   - RisingEdge
    #   - FallingEdge
    #   - LevelHigh
    #   - LevelLow
    # TriggerActivation: RisingEdge

    # 触发延迟。
    # 类型: float
    # 单位: 微秒(us)或毫秒(ms)，依机型定义为准。
    # TriggerDelay: 0.0

    # ============================================================
    # 8. IO / 线信号
    # ============================================================

    # 线选择器。
    # 类型: enum(string)
    # 常见值:
    #   - Line0
    #   - Line1
    #   - Line2
    # LineSelector: Line0

    # 线模式。
    # 类型: enum(string)
    # 常见值:
    #   - Input
    #   - Output
    # LineMode: Input

    # 输出线信号源。
    # 类型: enum(string)
    # 常见值:
    #   - ExposureStartActive
    #   - ExposureActive
    #   - FrameTriggerWait
    #   - UserOutput0
    # 注意: 仅在输出线模式下通常有意义。
    # LineSource: ExposureStartActive

    # ============================================================
    # 9. 用户配置集
    # ============================================================

    # 用户配置集选择器。
    # 类型: enum(string)
    # 常见值:
    #   - Default
    #   - UserSet1
    #   - UserSet2
    #   - UserSet3
    # UserSetSelector: Default

    # 上电默认加载的用户集。
    # 类型: enum(string)
    # 注意: 并非所有机型都支持。
    # UserSetDefault: Default

    # 注意：
    # 下列节点通常是 command 类型，当前这个驱动不能直接在 YAML 里执行：
    #   - UserSetLoad
    #   - UserSetSave
    #   - TriggerSoftware
    #   - AcquisitionStart
    #   - AcquisitionStop
    # 如需执行，请通过 execute_command 服务调用。

    # ============================================================
    # 10. Chunk 数据（高级调试项）
    # ============================================================

    # 是否启用 Chunk 模式。
    # 类型: bool
    # ChunkModeActive: true

    # Chunk 选择器。
    # 类型: enum(string)
    # 常见值:
    #   - Exposure
    #   - Timestamp
    #   - Gain
    # 注意: YAML 中同名键不能重复，
    #       若要启用多个 Chunk，请分次设置测试。
    # ChunkSelector: Exposure

    # 启用当前选中 Chunk。
    # 类型: bool
    # ChunkEnable: true

    # ============================================================
    # 11. 传输层与带宽（按需启用）
    # ============================================================

    # 设备链路吞吐限制。
    # 类型: integer
    # 单位: bps 或 Bps（取决于节点定义）
    # 注意: 常用于 GigE，USB 机型不一定支持。
    # DeviceLinkThroughputLimit: 100000000

    # GigE 包大小。
    # 类型: integer
    # 注意: 一般由驱动自动优化设置，通常不建议手动写死。
    # GevSCPSPacketSize: 1500

    # ============================================================
    # 12. 备注
    # ============================================================

    # 如果你想继续扩展：
    # - 这个驱动本质支持所有 int / float / bool / string / enum 型 GenICam 节点
    # - 只要节点名写对、机型支持、当前状态允许写，就可以在这里继续增加
    # - 若不确定节点名，优先在 MVCC 图形界面里确认后再加到这里
