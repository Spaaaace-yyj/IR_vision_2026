# 海康威视相机参数配置文件
# 该配置文件用于设置相机的基本参数，支持ROS 2参数服务器加载

/**:
  ros__parameters:
    # 相机序列号，用于唯一标识连接的相机设备
    # 类型: 字符串
    # 示例: "00775075482"
    cam_sn: "00775075482"
    
    # 图像宽度设置(像素)
    # 类型: 整数
    # 有效范围: 取决于相机型号和当前分辨率设置
    Width: 400
    
    # 图像高度设置(像素)
    # 类型: 整数
    # 有效范围: 取决于相机型号和当前分辨率设置
    Height: 400
    
    # 增益值设置，用于增强图像亮度
    # 类型: 浮点数
    # 单位: dB
    # 有效范围: 通常为 0.0 - 20.0 (具体取决于相机型号)
    Gain: 10.0
    
    # 曝光时间设置
    # 类型: 浮点数
    # 单位: 微秒(μs)
    # 有效范围: 通常为 10.0 - 100000.0 (具体取决于相机型号)
    ExposureTime: 1000.0
    
    # X轴偏移量，用于设置感兴趣区域(ROI)的起始位置
    # 类型: 整数
    # 有效范围: 0 - (最大宽度 - 设置宽度)
    OffsetX: 32
    
    # 像素格式设置
    # 类型: 字符串
    # 可选值: （需要相机支持)
    #   - Mono8: 8位灰度图
    #   - RGB8: 24位彩色图
    #   - BayerRG8: 8位Bayer格式
    #   - Mono10: 10位灰度图
    #   - Mono12: 12位灰度图
    PixelFormat: Mono8

    # ================================
    # 后期可扩展参数 (预留)
    # ================================
    # 可根据相机支持的节点 & 实际需要添加:
    #

    # # 注意事项:
    # # 1. 添加新参数时，请确保相机型号支持该参数
    # # 2. 建议参考相机官方文档了解参数详细说明
    #
